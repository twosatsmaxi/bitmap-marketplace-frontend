<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BITMAP — Bitcoin Block Ordinals Marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── RESET ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

/* ─── TOKENS ─────────────────────────────────────────────── */
:root{
  --bg:        #0A0A0A;
  --surf:      #111111;
  --surf2:     #161616;
  --border:    #1F1F1F;
  --primary:   #F7931A;
  --accent:    #FF6B00;
  --secondary: #E8D5A3;
  --muted:     #3A3A3A;
  --success:   #22C55E;
  --txt:       #F5F5F5;
  --txt2:      #8A8A8A;
  --fd: 'Space Grotesk', sans-serif;
  --fb: 'Inter', sans-serif;
  --fm: 'JetBrains Mono', monospace;
  --nav-h: 56px;
  --stat-h: 36px;
  --side-w: 264px;
}

/* ─── BASE ───────────────────────────────────────────────── */
body{background:var(--bg);color:var(--txt);font-family:var(--fb);font-size:13px;line-height:1.5;overflow-x:hidden}
button{cursor:pointer;font-family:inherit}
input{font-family:inherit}
a{text-decoration:none;color:inherit}

/* ─── SCROLLBAR ──────────────────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--muted);border-radius:0}
::-webkit-scrollbar-thumb:hover{background:#5A5A5A}

/* ─── NAV ────────────────────────────────────────────────── */
.nav{
  position:sticky;top:0;z-index:200;
  height:var(--nav-h);
  background:var(--surf);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 20px;gap:16px;
}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
.logo-mark{width:28px;height:28px;flex-shrink:0}
.logo-name{
  font-family:var(--fd);font-size:15px;font-weight:700;
  letter-spacing:0.12em;color:var(--txt);text-transform:uppercase
}
.nav-rule{width:1px;height:22px;background:var(--border);flex-shrink:0}

.search{position:relative;flex:1;max-width:380px}
.search input{
  width:100%;height:32px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:2px;
  color:var(--txt);
  font-family:var(--fm);font-size:11px;
  padding:0 10px 0 32px;
  outline:none;
  transition:border-color 180ms;
}
.search input::placeholder{color:var(--muted)}
.search input:focus{border-color:var(--primary)}
.search-ico{
  position:absolute;left:9px;top:50%;transform:translateY(-50%);
  color:var(--txt2);pointer-events:none;line-height:0
}

.nav-links{margin-left:auto;display:flex;align-items:center;gap:4px}
.nav-link{
  height:30px;padding:0 10px;
  background:transparent;border:none;border-radius:2px;
  font-size:12px;color:var(--txt2);
  transition:color 150ms,background 150ms;
}
.nav-link:hover{color:var(--txt);background:rgba(255,255,255,0.03)}

.btn-wallet{
  height:32px;padding:0 14px;
  background:transparent;
  border:1px solid var(--primary);
  border-radius:2px;
  color:var(--primary);
  font-family:var(--fm);font-size:11px;font-weight:500;
  letter-spacing:0.04em;
  transition:background 200ms,color 200ms;
  position:relative;overflow:hidden;
}
.btn-wallet:hover{background:var(--primary);color:#000}

/* ─── STATS BAR ──────────────────────────────────────────── */
.stats{
  position:sticky;top:var(--nav-h);z-index:190;
  height:var(--stat-h);
  background:var(--bg);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 20px;
  overflow:hidden;
}
.stat{
  display:flex;align-items:center;gap:7px;
  padding:0 16px;border-right:1px solid var(--border);
  flex-shrink:0;
}
.stat:first-child{padding-left:0}
.stat-lbl{
  font-size:10px;text-transform:uppercase;letter-spacing:0.09em;
  color:var(--txt2);
}
.stat-val{
  font-family:var(--fm);font-size:11px;font-weight:600;
  color:var(--secondary);
}
.stat-val.hi{color:var(--primary)}

/* ─── LAYOUT ─────────────────────────────────────────────── */
.layout{
  display:grid;
  grid-template-columns:var(--side-w) 1fr;
  min-height:calc(100vh - var(--nav-h) - var(--stat-h));
}

/* ─── SIDEBAR ────────────────────────────────────────────── */
.sidebar{
  border-right:1px solid var(--border);
  background:var(--surf);
  position:sticky;
  top:calc(var(--nav-h) + var(--stat-h));
  height:calc(100vh - var(--nav-h) - var(--stat-h));
  overflow-y:auto;
  overflow-x:hidden;
}
.sidebar::-webkit-scrollbar{width:3px}

.sb-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 12px;
  border-bottom:1px solid var(--border);
}
.sb-title{
  font-family:var(--fd);font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.12em;color:var(--txt2);
}
.sb-clear{
  font-family:var(--fm);font-size:10px;color:var(--primary);
  background:none;border:none;padding:0;
  transition:opacity 150ms;
}
.sb-clear:hover{opacity:0.65}

/* Accordion */
.flt{border-bottom:1px solid var(--border)}
.flt-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px;cursor:pointer;user-select:none;
  transition:background 150ms;
}
.flt-hd:hover{background:rgba(255,255,255,0.02)}
.flt-hd-title{font-size:12px;font-weight:500;color:var(--txt)}
.flt-arr{
  color:var(--txt2);flex-shrink:0;
  transition:transform 220ms cubic-bezier(.4,0,.2,1);
}
.flt.open .flt-arr{transform:rotate(180deg)}
.flt-bd{
  max-height:0;overflow:hidden;
  transition:max-height 240ms cubic-bezier(.4,0,.2,1);
}
.flt.open .flt-bd{max-height:320px}
.flt-inner{padding:6px 16px 14px}

/* Filter check items */
.flt-row{
  display:flex;align-items:center;gap:8px;
  padding:4px 0;cursor:pointer;
}
.flt-row input[type=checkbox]{
  appearance:none;width:13px;height:13px;flex-shrink:0;
  border:1px solid var(--muted);border-radius:1px;
  background:transparent;cursor:pointer;
  position:relative;
  transition:background 150ms,border-color 150ms;
}
.flt-row input[type=checkbox]:checked{
  background:var(--primary);border-color:var(--primary);
}
.flt-row input[type=checkbox]:checked::after{
  content:'';position:absolute;inset:2px;
  background:#000;
  clip-path:polygon(14% 44%,0 65%,50% 100%,100% 16%,80% 0%,43% 62%);
}
.flt-lbl{font-size:12px;color:var(--txt2);flex:1}
.flt-ct{font-family:var(--fm);font-size:10px;color:var(--muted)}

/* Range + inputs */
.range-wrap{display:flex;flex-direction:column;gap:8px}
.range-row{display:flex;gap:7px}
.p-input{
  flex:1;height:28px;
  background:var(--bg);border:1px solid var(--border);border-radius:2px;
  color:var(--txt);font-family:var(--fm);font-size:11px;
  padding:0 8px;outline:none;min-width:0;
  transition:border-color 150ms;
}
.p-input:focus{border-color:var(--primary)}
.p-input::placeholder{color:var(--muted)}
input[type=range]{
  appearance:none;width:100%;height:3px;
  background:var(--muted);border-radius:0;outline:none;
}
input[type=range]::-webkit-slider-thumb{
  appearance:none;width:13px;height:13px;
  background:var(--primary);border-radius:50%;cursor:pointer;
}

/* ─── MAIN ───────────────────────────────────────────────── */
.main{padding:16px;background:var(--bg)}
.toolbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.result-ct{font-size:12px;color:var(--txt2)}
.result-ct b{color:var(--txt);font-weight:500}
.sorts{display:flex;align-items:center;gap:2px}
.sort-btn{
  height:26px;padding:0 9px;
  background:transparent;border:1px solid var(--border);border-radius:2px;
  font-family:var(--fm);font-size:10px;color:var(--txt2);
  transition:all 140ms;white-space:nowrap;
}
.sort-btn:hover{border-color:var(--muted);color:var(--txt)}
.sort-btn.on{border-color:var(--primary);color:var(--primary);background:rgba(247,147,26,.05)}

/* ─── CARD MASONRY ───────────────────────────────────────── */
.grid{columns:3;column-gap:14px}

/* ─── CARD ───────────────────────────────────────────────── */
.card{
  display:block;break-inside:avoid;margin-bottom:14px;
  position:relative;background:var(--surf);
  border:1px solid var(--border);border-radius:2px;
  overflow:hidden;cursor:pointer;
  animation:fadeUp 420ms ease both;
}
.card:nth-child(1){animation-delay:40ms}
.card:nth-child(2){animation-delay:90ms}
.card:nth-child(3){animation-delay:130ms}
.card:nth-child(4){animation-delay:170ms}
.card:nth-child(5){animation-delay:210ms}
.card:nth-child(6){animation-delay:250ms}
.card:nth-child(7){animation-delay:290ms}
.card:nth-child(8){animation-delay:330ms}
.card:nth-child(9){animation-delay:370ms}
.card:nth-child(10){animation-delay:410ms}
.card:nth-child(11){animation-delay:450ms}
.card:nth-child(12){animation-delay:490ms}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* Orange border on hover (box-shadow avoids layout shift) */
.card::before{
  content:'';position:absolute;inset:0;z-index:10;
  box-shadow:inset 0 0 0 1px var(--primary);
  opacity:0;pointer-events:none;
  transition:opacity 150ms;
}
.card:hover::before{opacity:1}

/* Image area */
.card-img{position:relative;overflow:hidden;line-height:0}
.card-canvas{
  display:block;width:100%;height:auto;
  image-rendering:pixelated;image-rendering:crisp-edges;
}

/* Graph-paper overlay (on hover) */
.card-grid-overlay{
  position:absolute;inset:0;z-index:3;pointer-events:none;
  opacity:0;transition:opacity 220ms;
  background-image:
    linear-gradient(rgba(247,147,26,0.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(247,147,26,0.07) 1px,transparent 1px);
  background-size:12px 12px;
}
.card:hover .card-grid-overlay{opacity:1}

/* Badges */
.badge{
  position:absolute;top:8px;left:8px;z-index:8;
  height:16px;padding:0 5px;border-radius:1px;
  font-family:var(--fm);font-size:8.5px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.07em;
  display:flex;align-items:center;
}
.badge-uncommon{background:rgba(138,138,138,.18);color:#9A9A9A;border:1px solid rgba(138,138,138,.28)}
.badge-rare    {background:rgba(59,130,246,.14); color:#7AB4F8;border:1px solid rgba(59,130,246,.28)}
.badge-epic    {background:rgba(168,85,247,.14); color:#C384FC;border:1px solid rgba(168,85,247,.28)}

/* Status pill */
.card-status{
  position:absolute;top:8px;right:8px;z-index:8;
  height:16px;padding:0 5px;border-radius:1px;
  font-family:var(--fm);font-size:8.5px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.07em;
  display:flex;align-items:center;
}
.status-listed{background:rgba(247,147,26,.14);color:var(--primary);border:1px solid rgba(247,147,26,.28)}
.status-offer {background:rgba(34,197,94,.1);  color:var(--success);border:1px solid rgba(34,197,94,.24)}

/* Hover info strip */
.card-strip{
  position:absolute;bottom:0;left:0;right:0;z-index:9;
  background:linear-gradient(to top,rgba(8,8,8,.97) 55%,transparent);
  padding:22px 11px 11px;
  transform:translateY(100%);
  transition:transform 200ms cubic-bezier(.4,0,.2,1);
}
.card:hover .card-strip{transform:translateY(0)}

.card-blk{
  font-family:var(--fm);font-size:10px;color:var(--txt2);
  margin-bottom:5px;letter-spacing:0.04em;
}
.card-pr-row{display:flex;align-items:flex-end;justify-content:space-between;gap:6px}
.card-pr{display:flex;flex-direction:column;gap:1px}
.card-btc{font-family:var(--fm);font-size:13px;font-weight:600;color:var(--txt)}
.card-sats{font-family:var(--fm);font-size:9.5px;color:var(--txt2)}

.btn-buy{
  height:26px;padding:0 12px;flex-shrink:0;
  background:var(--primary);border:none;border-radius:2px;
  color:#000;font-family:var(--fm);font-size:10px;font-weight:600;
  letter-spacing:0.04em;white-space:nowrap;
  position:relative;overflow:hidden;
  transition:background 150ms;
}
.btn-buy:hover{background:var(--accent)}
.btn-buy::after{
  content:'';position:absolute;top:0;left:-100%;
  width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);
}
.btn-buy:hover::after{animation:shimmer 300ms ease forwards}
@keyframes shimmer{from{left:-60%}to{left:150%}}

/* ─── ANIMATIONS ─────────────────────────────────────────── */
@keyframes countUp{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<!-- ═══ NAV ═══════════════════════════════════════════════ -->
<nav class="nav">
  <a href="#" class="logo">
    <svg class="logo-mark" width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Pixel-art B mark on dark background -->
      <rect width="28" height="28" fill="#0A0A0A"/>
      <!-- B stem (left column) -->
      <rect x="5" y="5" width="4" height="18" fill="#F7931A"/>
      <!-- Top bar -->
      <rect x="9" y="5" width="8" height="4" fill="#F7931A"/>
      <!-- Top right bump -->
      <rect x="17" y="9" width="3" height="3" fill="#F7931A"/>
      <!-- Middle bar -->
      <rect x="9" y="12" width="8" height="3" fill="#F7931A"/>
      <!-- Mid right bump -->
      <rect x="17" y="15" width="4" height="4" fill="#F7931A"/>
      <!-- Bottom bar -->
      <rect x="9" y="19" width="9" height="4" fill="#F7931A"/>
      <!-- Orange pixel accent -->
      <rect x="22" y="5" width="2" height="2" fill="#FF6B00"/>
    </svg>
    <span class="logo-name">Bitmap</span>
  </a>

  <div class="nav-rule"></div>

  <div class="search">
    <span class="search-ico">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <circle cx="5.5" cy="5.5" r="4" stroke="#8A8A8A" stroke-width="1.25"/>
        <line x1="8.8" y1="8.8" x2="12" y2="12" stroke="#8A8A8A" stroke-width="1.25" stroke-linecap="square"/>
      </svg>
    </span>
    <input type="text" placeholder="Search block #, inscription ID, address…">
  </div>

  <div class="nav-links">
    <button class="nav-link">Activity</button>
    <button class="nav-link">My Ordinals</button>
    <button class="nav-link">Analytics</button>
    <button class="btn-wallet">Connect Wallet</button>
  </div>
</nav>

<!-- ═══ STATS BAR ══════════════════════════════════════════ -->
<div class="stats">
  <div class="stat">
    <span class="stat-lbl">Floor</span>
    <span class="stat-val hi" data-target="0.00110" data-suffix=" BTC" data-decimals="5">0.00000 BTC</span>
  </div>
  <div class="stat">
    <span class="stat-lbl">Vol 24h</span>
    <span class="stat-val" data-target="1.24" data-suffix=" BTC" data-decimals="2">0.00 BTC</span>
  </div>
  <div class="stat">
    <span class="stat-lbl">Listed</span>
    <span class="stat-val" data-target="847" data-suffix="" data-decimals="0">0</span>
  </div>
  <div class="stat">
    <span class="stat-lbl">Owners</span>
    <span class="stat-val" data-target="12349" data-suffix="" data-decimals="0" data-comma="1">0</span>
  </div>
  <div class="stat">
    <span class="stat-lbl">All Time Vol</span>
    <span class="stat-val" data-target="48.7" data-suffix=" BTC" data-decimals="1">0.0 BTC</span>
  </div>
</div>

<!-- ═══ LAYOUT ════════════════════════════════════════════ -->
<div class="layout">

  <!-- ── SIDEBAR ─────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sb-head">
      <span class="sb-title">Filters</span>
      <button class="sb-clear">Clear all</button>
    </div>

    <!-- Status -->
    <div class="flt open">
      <div class="flt-hd">
        <span class="flt-hd-title">Status</span>
        <svg class="flt-arr" width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M2.5 5l4 4 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="square" fill="none"/>
        </svg>
      </div>
      <div class="flt-bd">
        <div class="flt-inner">
          <label class="flt-row"><input type="checkbox" checked><span class="flt-lbl">Buy Now</span><span class="flt-ct">847</span></label>
          <label class="flt-row"><input type="checkbox"><span class="flt-lbl">Has Offers</span><span class="flt-ct">234</span></label>
          <label class="flt-row"><input type="checkbox"><span class="flt-lbl">Unlisted</span><span class="flt-ct">11,502</span></label>
        </div>
      </div>
    </div>

    <!-- Price Range -->
    <div class="flt open">
      <div class="flt-hd">
        <span class="flt-hd-title">Price Range</span>
        <svg class="flt-arr" width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M2.5 5l4 4 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="square" fill="none"/>
        </svg>
      </div>
      <div class="flt-bd">
        <div class="flt-inner">
          <div class="range-wrap">
            <input type="range" min="0" max="1" step="0.001" value="0.4">
            <div class="range-row">
              <input class="p-input" type="text" placeholder="Min BTC">
              <input class="p-input" type="text" placeholder="Max BTC">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Block Range -->
    <div class="flt">
      <div class="flt-hd">
        <span class="flt-hd-title">Block Range</span>
        <svg class="flt-arr" width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M2.5 5l4 4 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="square" fill="none"/>
        </svg>
      </div>
      <div class="flt-bd">
        <div class="flt-inner">
          <div class="range-row">
            <input class="p-input" type="text" placeholder="From #0">
            <input class="p-input" type="text" placeholder="To #840k">
          </div>
        </div>
      </div>
    </div>

    <!-- Bitmap Type -->
    <div class="flt open">
      <div class="flt-hd">
        <span class="flt-hd-title">Bitmap Type</span>
        <svg class="flt-arr" width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M2.5 5l4 4 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="square" fill="none"/>
        </svg>
      </div>
      <div class="flt-bd">
        <div class="flt-inner">
          <label class="flt-row"><input type="checkbox"><span class="flt-lbl">City</span><span class="flt-ct">3,421</span></label>
          <label class="flt-row"><input type="checkbox"><span class="flt-lbl">Grid</span><span class="flt-ct">2,876</span></label>
          <label class="flt-row"><input type="checkbox"><span class="flt-lbl">Punk</span><span class="flt-ct">1,204</span></label>
          <label class="flt-row"><input type="checkbox"><span class="flt-lbl">Palindrome</span><span class="flt-ct">89</span></label>
          <label class="flt-row"><input type="checkbox"><span class="flt-lbl">Mondrian</span><span class="flt-ct">312</span></label>
        </div>
      </div>
    </div>

    <!-- Sat Rarity -->
    <div class="flt open">
      <div class="flt-hd">
        <span class="flt-hd-title">Sat Rarity</span>
        <svg class="flt-arr" width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M2.5 5l4 4 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="square" fill="none"/>
        </svg>
      </div>
      <div class="flt-bd">
        <div class="flt-inner">
          <label class="flt-row"><input type="checkbox"><span class="flt-lbl">Epic</span><span class="flt-ct">4</span></label>
          <label class="flt-row"><input type="checkbox"><span class="flt-lbl">Rare</span><span class="flt-ct">47</span></label>
          <label class="flt-row"><input type="checkbox"><span class="flt-lbl">Uncommon</span><span class="flt-ct">1,234</span></label>
          <label class="flt-row"><input type="checkbox"><span class="flt-lbl">Common</span><span class="flt-ct">11,064</span></label>
        </div>
      </div>
    </div>
  </aside>

  <!-- ── MAIN ────────────────────────────────────────────── -->
  <main class="main">
    <div class="toolbar">
      <p class="result-ct"><b>847</b> inscriptions</p>
      <div class="sorts">
        <button class="sort-btn on">Price ↑</button>
        <button class="sort-btn">Price ↓</button>
        <button class="sort-btn">Recent</button>
        <button class="sort-btn">Oldest Block</button>
        <button class="sort-btn">Rarity</button>
      </div>

    <div class="grid" id="grid"></div>
  </main>
</div>

<script>
/* ─── PRNG (Mulberry32) ───────────────────────────────────── */
function prng(seed) {
  let s = seed >>> 0;
  return () => {
    s |= 0; s = s + 0x6D2B79F5 | 0;
    let t = Math.imul(s ^ s >>> 15, 1 | s);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

/* ─── BITMAP RENDERERS ───────────────────────────────────── */

function renderCity(ctx, W, H, rn) {
  ctx.fillStyle = '#0A0A0A';
  ctx.fillRect(0, 0, W, H);

  const CELL = 4;
  const cols = Math.floor(W / CELL);
  const rows = Math.floor(H / CELL);

  // Generate cluster centres
  const nC = Math.floor(rn() * 4 + 3);
  const centres = Array.from({length: nC}, () => ({
    x: rn(), y: rn(), r: rn() * 0.22 + 0.09, s: rn() * 0.4 + 0.6
  }));

  for (let gy = 0; gy < rows; gy++) {
    for (let gx = 0; gx < cols; gx++) {
      const nx = gx / cols, ny = gy / rows;
      let val = 0;
      for (const c of centres) {
        const d = Math.sqrt((nx - c.x) ** 2 + (ny - c.y) ** 2);
        val = Math.max(val, c.s * Math.max(0, 1 - d / c.r));
      }
      val = val * 0.72 + rn() * 0.28;
      if (val < 0.18) continue;

      const px = gx * CELL + 1, py = gy * CELL + 1, sz = CELL - 1;

      if      (val > 0.82) { ctx.globalAlpha = 1;            ctx.fillStyle = '#F7931A'; }
      else if (val > 0.62) { ctx.globalAlpha = .85;          ctx.fillStyle = '#FF6B00'; }
      else if (val > 0.42) { ctx.globalAlpha = .6 + val*.2;  ctx.fillStyle = '#E8D5A3'; }
      else                 { ctx.globalAlpha = .3 + val*.4;  ctx.fillStyle = '#4A4A4A'; }

      ctx.fillRect(px, py, sz, sz);
      ctx.globalAlpha = 1;
    }
  }
}

function renderGrid(ctx, W, H, rn) {
  ctx.fillStyle = '#0A0A0A';
  ctx.fillRect(0, 0, W, H);

  const CELL = 9, GAP = 1;
  const cols = Math.floor(W / CELL);
  const rows = Math.floor(H / CELL);

  // Grid lines
  ctx.strokeStyle = '#1A1A1A'; ctx.lineWidth = 1;
  for (let x = 0; x <= cols; x++) {
    ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, H); ctx.stroke();
  }
  for (let y = 0; y <= rows; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(W, y * CELL); ctx.stroke();
  }

  for (let gy = 0; gy < rows; gy++) {
    for (let gx = 0; gx < cols; gx++) {
      const v = rn();
      if (v < 0.22) continue;

      let color, alpha;
      if      (v > 0.94) { color = '#F7931A'; alpha = 1; }
      else if (v > 0.80) { color = '#FF6B00'; alpha = .78; }
      else if (v > 0.64) { color = '#E8D5A3'; alpha = .6; }
      else if (v > 0.42) { color = '#5A5A5A'; alpha = .65; }
      else               { color = '#2A2A2A'; alpha = .7; }

      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.fillRect(gx * CELL + GAP, gy * CELL + GAP, CELL - GAP * 2, CELL - GAP * 2);
      ctx.globalAlpha = 1;
    }
  }
}

function renderMondrian(ctx, W, H, rn) {
  const pal = ['#F7931A','#FF6B00','#E8D5A3','#F0F0F0','#FFFFFF','#1A1A1A','#222222','#2C2C2C'];

  function sub(x, y, w, h, d) {
    if (d <= 0 || w < 22 || h < 22) {
      const c = pal[Math.floor(rn() * pal.length)];
      ctx.fillStyle = c;
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = '#080808'; ctx.lineWidth = 3;
      ctx.strokeRect(x, y, w, h);
      return;
    }
    const horiz = h > 50 && (w <= 50 || rn() > 0.48);
    if (horiz) {
      const sp = Math.floor(rn() * (h - 40) + 20);
      sub(x, y, w, sp, d - 1);
      sub(x, y + sp, w, h - sp, d - 1);
    } else if (w > 40) {
      const sp = Math.floor(rn() * (w - 40) + 20);
      sub(x, y, sp, h, d - 1);
      sub(x + sp, y, w - sp, h, d - 1);
    } else {
      ctx.fillStyle = pal[Math.floor(rn() * pal.length)];
      ctx.fillRect(x, y, w, h);
    }
  }
  sub(0, 0, W, H, 5);
}

function renderPunk(ctx, W, H, rn) {
  ctx.fillStyle = '#0A0A0A';
  ctx.fillRect(0, 0, W, H);

  // Scanlines
  for (let y = 0; y < H; y += 3) {
    ctx.fillStyle = 'rgba(255,255,255,0.012)';
    ctx.fillRect(0, y, W, 1);
  }

  const CELL = 5;
  const cols = Math.floor(W / CELL);
  const rows = Math.floor(H / CELL);

  for (let gy = 0; gy < rows; gy++) {
    for (let gx = 0; gx < cols; gx++) {
      const v = rn();
      if (v > 0.24) continue;

      let color;
      if      (v < 0.008) color = '#F7931A';
      else if (v < 0.020) color = '#FF6B00';
      else if (v < 0.060) color = '#E8D5A3';
      else if (v < 0.130) color = '#6A6A6A';
      else                color = '#333333';

      ctx.fillStyle = color;
      ctx.fillRect(gx * CELL, gy * CELL, CELL - 1, CELL - 1);
    }
  }

  // Bold orange punk accents (larger squares)
  const nAcc = Math.floor(rn() * 7 + 5);
  for (let i = 0; i < nAcc; i++) {
    const gx = Math.floor(rn() * (cols - 3));
    const gy = Math.floor(rn() * (rows - 3));
    const sz = (Math.floor(rn() * 2) + 2) * CELL;
    ctx.fillStyle = rn() > 0.5 ? '#F7931A' : '#FF6B00';
    ctx.fillRect(gx * CELL, gy * CELL, sz, sz);
  }
}

function renderPalindrome(ctx, W, H, rn) {
  ctx.fillStyle = '#0A0A0A';
  ctx.fillRect(0, 0, W, H);

  const CELL = 6;
  const halfCols = Math.floor(W / 2 / CELL);
  const rows = Math.floor(H / CELL);

  for (let gy = 0; gy < rows; gy++) {
    for (let gx = 0; gx < halfCols; gx++) {
      const v = rn();
      if (v < 0.32) continue;

      let color;
      if      (v > 0.94) color = '#F7931A';
      else if (v > 0.84) color = '#FF6B00';
      else if (v > 0.72) color = '#E8D5A3';
      else if (v > 0.56) color = '#5A5A5A';
      else               color = '#2E2E2E';

      ctx.fillStyle = color;
      // left side
      ctx.fillRect(gx * CELL + 1, gy * CELL + 1, CELL - 1, CELL - 1);
      // mirrored right side
      const rx = W - (gx + 1) * CELL + 1;
      ctx.fillRect(rx, gy * CELL + 1, CELL - 1, CELL - 1);
    }
  }

  // Centre column
  const cx = Math.floor(W / 2);
  for (let gy = 0; gy < rows; gy++) {
    const v = rn();
    if (v < 0.38) continue;
    ctx.fillStyle = v > 0.8 ? '#F7931A' : '#E8D5A3';
    ctx.fillRect(cx - 3, gy * CELL + 1, CELL - 1, CELL - 1);
  }
}

/* ─── RENDER DISPATCH ────────────────────────────────────── */
function render(canvas, block, type) {
  const rn = prng(block);
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  if (type === 'city')       renderCity(ctx, W, H, rn);
  else if (type === 'grid')  renderGrid(ctx, W, H, rn);
  else if (type === 'mondrian') renderMondrian(ctx, W, H, rn);
  else if (type === 'punk')  renderPunk(ctx, W, H, rn);
  else                       renderPalindrome(ctx, W, H, rn);
}

/* ─── CARD DATA ──────────────────────────────────────────── */
const CARDS = [

/* ─── BUILD CARDS ────────────────────────────────────────── */
const W_CANVAS = 300;

const rarityLabels  = { uncommon:'Uncommon',        rare:'Rare',        epic:'Epic' };

/* ─── STATS COUNT-UP ─────────────────────────────────────── */
function countUp(el) {
  const target    = parseFloat(el.dataset.target);
  const suffix    = el.dataset.suffix || '';
  const decimals  = parseInt(el.dataset.decimals ?? 0);
  const comma     = el.dataset.comma === '1';
  const duration  = 1200;
  const start     = performance.now();

  function tick(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    // Ease out cubic
    const ease = 1 - Math.pow(1 - progress, 3);
    const val = target * ease;
    let str = val.toFixed(decimals);
    if (comma && decimals === 0) str = Math.round(val).toLocaleString();
    el.textContent = str + suffix;
    if (progress < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// Trigger count-up when stats bar enters view
const statsObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      document.querySelectorAll('[data-target]').forEach(countUp);
      statsObs.disconnect();
    }
  });
}, { threshold: 0.5 });
statsObs.observe(document.querySelector('.stats'));
